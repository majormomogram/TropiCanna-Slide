kind = "web"
previewPath = "/"
title = "TropiCanna Water"
version = "1.0.0"
id = "artifacts/tropicanna-water"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20823

[services.development]
run = "pnpm --filter @workspace/tropicanna-water run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tropicanna-water", "run", "build" ]
publicDir = "artifacts/tropicanna-water/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20823"
BASE_PATH = "/"
